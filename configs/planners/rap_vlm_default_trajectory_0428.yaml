rap:
  output_suffix: rap_vlm_default_trajectory
  launch_path: ./planners/rap/launch.sh
  repo_root: /bigdata/aidan/RAP
  checkpoint: /bigdata/aidan/models/RAP_ckpts/RAP_DINO_navsimv2.ckpt
  python_bin: /bigdata/aidan/.home/envs/rap/bin/python
  device: cuda
  image_scale: 0.4
  use_scene_rig_lidar2img: true
  hf_hub_offline: true
  transformers_offline: true
  hf_home: /bigdata/aidan/models/hf
  hf_hub_cache: /bigdata/aidan/models/hf/hub
  transformers_cache: /bigdata/aidan/models/hf/hub
  nuplan_devkit_dir: /bigdata/jason/drivor_evaluation/DrivoR/nuplan-devkit
  backbone_path: /bigdata/aidan/models/hf/dinov3-vith16plus-pretrain-

  vlm:
    enabled: true
    intervention_enabled: false
    camera_mode: front_only
    scoring_camera_mode: front_only
    backend: local_transformers_subprocess
    model_id: Qwen/Qwen3-VL-8B-Instruct
    output_model_slug: qwen3-vl-8b-instruct
    device: auto
    python_bin: /bigdata/aidan/.home/envs/vlm/bin/python
    max_new_tokens: 300
    candidate_limit: 5
    timeout_sec: 300.0
    save_debug_artifacts: true
    debug_dir_name: vlm_debug
    carry_previous_enabled: true
    carry_previous_min_path_m: 0.5
    carry_previous_min_points: 2
    adaptive_replan_mode: log_only
    latency_tracking_mode: full_timeline
    q_enabled: true
    q_switch_margin: 0.05
    q_weight_rap_score: 0.55
    q_weight_progress: 0.30
    q_weight_offcenter: 0.10
    q_weight_curvature: 0.08
    q_weight_shortplan: 0.18
    q_carry_score_decay: 0.0
    display_default_trajectories: true
    include_default_candidates: true
